<div class="catalogo-page">
  <main class="catalogo-page__container">

    <div class="catalogo-page__header catalogo-page__header-line">
      <h1 class="catalogo-page__title">{{ catalogTitle }}</h1>
    </div>

    @if (esGaleria) {
      <div class="catalogo-page__grid">
        @for (item of imagenesGaleria; track item.imagen) {
          <div class="catalogo-page-card">
            <div class="catalogo-page-card__image-wrapper">
              <img
                class="catalogo-page-card__image"
                [src]="imagenGaleriaPath(item)"
                [alt]="item.nombre"
              />
            </div>
            <div class="catalogo-page-card__body">
              <h3 class="catalogo-page-card__title">{{ item.nombre }}</h3>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="catalogo-page__grid">
        @for (producto of productos; track producto.id) {
          <div
            class="catalogo-page-card catalogo-page-card--clickable"
            [routerLink]="['/catalogo', categoria, producto.id]"
          >
            <div class="catalogo-page-card__image-wrapper">
              <img
                class="catalogo-page-card__image"
                [src]="imagenPath(producto)"
                [alt]="producto.nombre"
                (error)="onImageError($event, producto)"
              />
            </div>
            <div class="catalogo-page-card__body">
              <h3 class="catalogo-page-card__title">{{ producto.nombre }}</h3>
            </div>
          </div>
        }
      </div>
    }

  </main>
</div>
