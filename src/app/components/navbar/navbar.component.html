<nav class="navbar" [class.navbar--scrolled]="isDark">
  <a class="navbar__brand" routerLink="/" fragment=""><img src="logo/logo.png" alt="Logo" class="navbar__logo"></a>

  <ul class="navbar__nav">
    <li><a class="navbar__link-outline" routerLink="/" fragment="nuestros_productos">NUESTROS PRODUCTOS</a></li>
    <li><a class="navbar__cta" routerLink="/" fragment="contacto">CONTÁCTENOS</a></li>
  </ul>

  <button
    class="navbar__hamburger"
    [class.navbar__hamburger--open]="isMenuOpen"
    (click)="toggleMenu()"
    [attr.aria-label]="isMenuOpen ? 'Cerrar menú' : 'Abrir menú'"
    [attr.aria-expanded]="isMenuOpen"
  >
    <i [class]="isMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
  </button>
</nav>

<div class="navbar__drawer" [class.navbar__drawer--open]="isMenuOpen">
  <a class="navbar__link-outline" routerLink="/" fragment="nuestros_productos" (click)="closeMenu()">NUESTROS PRODUCTOS</a>
  <a class="navbar__cta" routerLink="/" fragment="contacto" (click)="closeMenu()">CONTÁCTENOS</a>
</div>
