name: Compilar y Desplegar Angular en GoDaddy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # ← estaba "node-node", era un typo
        cache: 'npm'

    - name: 📦 Instalar dependencias
      run: npm ci

    - name: 🏗️ Compilar el proyecto Angular
      run: npm run build -- --configuration=production

    - name: 🚀 Subir compilado a GoDaddy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        security: loose
        local-dir: ./dist/hidrosoldaduras-web/browser/
        exclude: |
          **/.vscode/**
        dangerous-clean-slate: false